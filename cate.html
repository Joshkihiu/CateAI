<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cate AI Assistant</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: black;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }
    #speechBox {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #00ffff;
      color: #00ffff;
      font-family: monospace;
      border-radius: 10px;
      box-shadow: 0 0 12px #00ffff;
      text-align: center;
      z-index: 2;
      min-width: 60px;
      max-width: 80%;
      transition: all 0.3s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #speechBox.expanded {
      min-width: 300px;
    }
    #speechText {
      flex-grow: 1;
    }
    #speechInput {
      background: transparent;
      border: none;
      color: #00ffff;
      font-family: monospace;
      font-size: 14px;
      outline: none;
      flex-grow: 1;
    }
    #micIcon {
      width: 18px;
      height: 18px;
      fill: #00ffff;
      cursor: pointer;
    }
    #sideMenu {
  position: fixed;
  top: 0;
  left: -250px;
  width: 250px;
  height: 100%;
  background: rgba(0, 0, 0, 0.95);
  color: #00ffff;
  padding: 20px;
  transition: left 0.3s ease;
  z-index: 4;
  font-family: monospace;
  overflow-y: auto;
  border-top-right-radius: 35px;
  border-bottom-right-radius: 35px;

  display: flex;
  flex-direction: column;
}

    #sideMenu * {
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #sideMenu.open {
      left: 0;
    }
    #sideMenu.open * {
      opacity: 1;
    }
    #sideMenu h2 {
      margin: 0 0 10px;
      font-size: 20px;
      text-align: center;
    }
    #profilePic {
      display: block;
      margin: 0 auto 20px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #00ffff;
      object-fit: cover;
      box-shadow: 0 0 10px #00ffff;
    }
    .historyBox {
      margin-top: 20px;
      flex-grow: 0.;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #00ffff;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 0 10px rgba(0,255,255,0.3);
      height: 300px;
      overflow-y: auto;
    }
    .historyEntry {
  background: rgba(0, 0, 0, 0.7);
  border: 1px solid #00ffff70;
  border-radius: 8px;
  padding: 8px 10px;
  margin-bottom: 10px;
  font-size: 13px;
  color: #00ffff;
  font-family: monospace;
  box-shadow: 0 0 6px #00ffff30;
  cursor: pointer;
  transition: background 0.2s ease;
}

.historyEntry:hover {
  background: rgba(0, 255, 255, 0.15);
}

    .newChatBtn {
      margin-top: 15px;
      padding: 8px 12px;
      background: #00ffff;
      color: black;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-family: monospace;
      box-shadow: 0 0 10px #00ffff;
    }
    .authButtons {
  margin-top: auto;
  margin-bottom: 30px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

    .menuOption {
      padding: 8px;
      background: #00ffff;
      color: black;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-family: monospace;
      box-shadow: 0 0 8px #00ffff;
      text-align: center;
      
    }
    .menuStuff {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
    .authBtn {
      padding: 8px;
      background: #00ffff;
      color: black;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-family: monospace;
      box-shadow: 0 0 8px #00ffff;
      
    
    }
  </style>
</head>
<body>
  <div id="sideMenu">
    <h2>Welcome Josh 👋</h2>
    <img id="profilePic" src="pic.jpg" alt="Profile Picture">
    <div class="menuStuff">
    <div class="menuOption">Account</div>
    <div class="menuOption">Settings</div>
    <div class="menuOption">Another One</div>
    <div class="menuOption">Another One</div>
    <div class="menuOption">Another One</div>
    </div>
    <button class="newChatBtn">+ New Chat</button>
    <div class="historyBox" id="historyBox">
  <div class="historyEntry">How to eat bananas</div>
  <div class="historyEntry">Install Python</div>
  <div class="historyEntry">Quantum AI?</div>
</div>

    <div class="authButtons">
      <button class="authBtn">Login</button>
      <button class="authBtn">Sign Up</button>
    </div>
  </div>

  <div id="speechBox">
    <input id="speechInput" placeholder="Say or type something...">
    <svg id="micIcon" viewBox="0 0 24 24">
      <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 14 0h-2zM11 18v3h2v-3h-2z"/>
    </svg>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const micIcon = document.getElementById('micIcon');
    const speechBox = document.getElementById('speechBox');
    micIcon.addEventListener('click', () => {
      speechBox.classList.toggle('expanded');
    });

    const sideMenu = document.getElementById('sideMenu');
    document.addEventListener('mousemove', (e) => {
      if (e.clientX < 5) {
        sideMenu.classList.add('open');
      }
    });
    sideMenu.addEventListener('mouseleave', () => {
      sideMenu.classList.remove('open');
    });

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 3;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const particleCount = 1000;
    const positions = [];
    const points = [];
    const radius = 1;

    for (let i = 0; i < particleCount; i++) {
      const theta = Math.random() * 2 * Math.PI;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = radius + Math.sin(i * 0.1) * 0.05;
      const x = r * Math.sin(phi) * Math.cos(theta);
      const y = r * Math.sin(phi) * Math.sin(theta);
      const z = r * Math.cos(phi);
      positions.push(x, y, z);
      points.push(new THREE.Vector3(x, y, z));
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

    const material = new THREE.PointsMaterial({
      color: 'cyan',
      size: 0.02,
      transparent: true,
      opacity: 0.8
    });

    const particleSphere = new THREE.Points(geometry, material);
    scene.add(particleSphere);

    const lineMaterial = new THREE.LineBasicMaterial({ color: '#00ffff', transparent: true, opacity: 0.2 });
    const lineGeometry = new THREE.BufferGeometry();
    const maxConnections = 4000;
    const linePositions = new Float32Array(maxConnections * 6);
    lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
    const connectionLines = new THREE.LineSegments(lineGeometry, lineMaterial);
    scene.add(connectionLines);

    let rotateSpeed = 0.01;
    let scale = 0.6;
    let active = true;
    let showLines = true;

    function animate() {
      requestAnimationFrame(animate);
      if (active) {
        particleSphere.rotation.y += rotateSpeed;
        particleSphere.scale.set(scale, scale, scale);

        const time = Date.now() * 0.001;
        const pos = particleSphere.geometry.attributes.position.array;
        for (let i = 0; i < pos.length; i += 3) {
          const dx = Math.sin(time + i * 0.1) * 0.002;
          const dy = Math.cos(time + i * 0.1) * 0.002;
          const dz = Math.sin(time + i * 0.1) * 0.002;
          pos[i] += dx;
          pos[i + 1] += dy;
          pos[i + 2] += dz;
          points[i / 3].set(pos[i], pos[i + 1], pos[i + 2]);
        }
        particleSphere.geometry.attributes.position.needsUpdate = true;

        if (showLines) {
          let ptr = 0;
          for (let i = 0; i < points.length; i++) {
            for (let j = i + 1; j < points.length; j++) {
              const dist = points[i].distanceTo(points[j]);
              if (dist < 0.15 && ptr < maxConnections * 6) {
                linePositions[ptr++] = points[i].x;
                linePositions[ptr++] = points[i].y;
                linePositions[ptr++] = points[i].z;
                linePositions[ptr++] = points[j].x;
                linePositions[ptr++] = points[j].y;
                linePositions[ptr++] = points[j].z;
              }
            }
          }
          lineGeometry.setDrawRange(0, ptr / 3);
          lineGeometry.attributes.position.needsUpdate = true;
        }
      }
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
