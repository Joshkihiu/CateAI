<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cate AI Assistant</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: black;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      transition: all 0.3s ease;
    }
    #speechBox {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #00ffff;
      color: #00ffff;
      font-family: monospace;
      border-radius: 10px;
      box-shadow: 0 0 12px #00ffff;
      text-align: center;
      z-index: 3;
      min-width: 60px;
      max-width: 80%;
      transition: all 0.3s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #speechBox.expanded {
      min-width: 300px;
    }
    #speechInput {
      background: transparent;
      border: none;
      color: #00ffff;
      font-family: monospace;
      font-size: 14px;
      outline: none;
      flex-grow: 1;
    }
    #micIcon {
      width: 18px;
      height: 18px;
      fill: #00ffff;
      cursor: pointer;
    }
    #responseBox {
      position: absolute;
      left: 50%;
      bottom: 80px;
      transform: translateX(-50%);
      width: 90%;
      max-width: 600px;
      max-height: 300px;
      background: rgba(0, 0, 0, 0.85);
      border: 2px solid #00ffff;
      border-radius: 15px;
      box-shadow: 0 0 20px #00ffff;
      padding: 20px;
      overflow-y: auto;
      color: #00ffff;
      font-family: monospace;
      z-index: 3;
      display: none;
    }
  </style>
</head>
<body>
  <div id="speechBox">
    <input id="speechInput" placeholder="Say or type something...">
    <svg id="micIcon" viewBox="0 0 24 24">
      <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 14 0h-2zM11 18v3h2v-3h-2z"/>
    </svg>
  </div>
  <div id="responseBox"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const micIcon = document.getElementById('micIcon');
    const speechBox = document.getElementById('speechBox');
    const input = document.getElementById('speechInput');
    const responseBox = document.getElementById('responseBox');
    const canvas = document.querySelector('canvas');

    micIcon.addEventListener("click", async () => {
      speechBox.classList.add("expanded");
      const userText = input.value.trim();
      if (!userText) return;

      input.value = "Thinking...";
      const reply = await callOpenAI(userText);
      input.value = "";
      displayAIReply(reply);
    });

    function displayAIReply(text) {
      if (text.length > 30) {
        responseBox.style.display = 'block';
        canvas.style.transform = 'translateY(-50px) scale(0.8)';
      }
      const p = document.createElement("p");
      p.textContent = "🤖 " + text;
      p.style.margin = "10px 0";
      responseBox.appendChild(p);
      responseBox.scrollTop = responseBox.scrollHeight;
    }

    async function callOpenAI(prompt) {
      const response = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": "Bearer YOUR_API_KEY",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "gpt-4",
          messages: [{ role: "user", content: prompt }],
          temperature: 0.7
        })
      });

      const data = await response.json();
      return data.choices?.[0]?.message?.content || "No response.";
    }

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 3;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const particleCount = 1000;
    const positions = [];
    const points = [];
    const radius = 1;

    for (let i = 0; i < particleCount; i++) {
      const theta = Math.random() * 2 * Math.PI;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = radius + Math.sin(i * 0.1) * 0.05;
      const x = r * Math.sin(phi) * Math.cos(theta);
      const y = r * Math.sin(phi) * Math.sin(theta);
      const z = r * Math.cos(phi);
      positions.push(x, y, z);
      points.push(new THREE.Vector3(x, y, z));
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

    const material = new THREE.PointsMaterial({
      color: 'cyan',
      size: 0.02,
      transparent: true,
      opacity: 0.8
    });

    const particleSphere = new THREE.Points(geometry, material);
    scene.add(particleSphere);

    const lineMaterial = new THREE.LineBasicMaterial({ color: '#00ffff', transparent: true, opacity: 0.2 });
    const lineGeometry = new THREE.BufferGeometry();
    const maxConnections = 4000;
    const linePositions = new Float32Array(maxConnections * 6);
    lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
    const connectionLines = new THREE.LineSegments(lineGeometry, lineMaterial);
    scene.add(connectionLines);

    let rotateSpeed = 0.01;
    let scale = 0.6;
    let active = true;
    let showLines = true;

    function animate() {
      requestAnimationFrame(animate);
      if (active) {
        particleSphere.rotation.y += rotateSpeed;
        particleSphere.scale.set(scale, scale, scale);

        const time = Date.now() * 0.001;
        const pos = particleSphere.geometry.attributes.position.array;
        for (let i = 0; i < pos.length; i += 3) {
          const dx = Math.sin(time + i * 0.1) * 0.002;
          const dy = Math.cos(time + i * 0.1) * 0.002;
          const dz = Math.sin(time + i * 0.1) * 0.002;
          pos[i] += dx;
          pos[i + 1] += dy;
          pos[i + 2] += dz;
          points[i / 3].set(pos[i], pos[i + 1], pos[i + 2]);
        }
        particleSphere.geometry.attributes.position.needsUpdate = true;

        if (showLines) {
          let ptr = 0;
          for (let i = 0; i < points.length; i++) {
            for (let j = i + 1; j < points.length; j++) {
              const dist = points[i].distanceTo(points[j]);
              if (dist < 0.15 && ptr < maxConnections * 6) {
                linePositions[ptr++] = points[i].x;
                linePositions[ptr++] = points[i].y;
                linePositions[ptr++] = points[i].z;
                linePositions[ptr++] = points[j].x;
                linePositions[ptr++] = points[j].y;
                linePositions[ptr++] = points[j].z;
              }
            }
          }
          lineGeometry.setDrawRange(0, ptr / 3);
          lineGeometry.attributes.position.needsUpdate = true;
        }
      }
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
